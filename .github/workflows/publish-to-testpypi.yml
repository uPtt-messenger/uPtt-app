name: Publish Python Package to PyPI

on:
  push:
    paths:
      - 'src/**'
      - 'setup.py'
      - 'requirements.txt'
      - 'MANIFEST.in'
      - '.github/workflows/publish-to-testpypi.yml'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.8", "3.9", "3.10", "3.11", "3.12", "3.13" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pytest

  deploy:
    name: Publish to TestPyPI
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      # This permission is needed for trusted publishing
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Generate development version
        id: version
        run: |
          BASE_VERSION=$(grep "__version__" src/uPttTerm/__init__.py | sed -e 's/__version__ = "//' -e 's/"//')
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          DEV_VERSION="${BASE_VERSION}.dev${TIMESTAMP}"
          echo "version=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "Setting version to ${DEV_VERSION}"

      - name: Update version in __init__.py
        run: |
          sed -i 's/__version__ = .*/__version__ = "${{ steps.version.outputs.version }}"/' src/uPttTerm/__init__.py
          echo "Updated src/uPttTerm/__init__.py to version ${{ steps.version.outputs.version }}"
          cat src/uPttTerm/__init__.py

      - name: Install build dependencies
        run: python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/