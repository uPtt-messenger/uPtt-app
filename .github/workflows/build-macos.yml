name: Build macOS App

on:
  push:
    tags:
      - 'v**'
  workflow_dispatch:

jobs:
  # 第一階段：執行測試
  test:
    # 確保在 macOS 執行以避免 Linux 缺失 .so 函式庫問題
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          # 使用 QT_QPA_PLATFORM=offscreen 確保在無介面環境下能執行 Qt 測試
          QT_QPA_PLATFORM=offscreen pytest tests/

  # 第二階段：測試通過後執行編譯
  build:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install nuitka zstandard

      - name: Build with Nuitka
        run: |
          PYTHONPATH=src python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --plugin-enable=pyside6 \
            --include-package=PyPtt \
            --include-package-data=uPtt.ui.assets \
            --macos-app-name="uPtt" \
            --output-dir=dist \
            --no-pyi-file \
            src/run_app.py

      - name: Package .app for distribution
        run: |
          cd dist
          if [ -d "uPtt.app" ]; then
            zip -r uPtt.zip uPtt.app
          elif [ -d "run_app.app" ]; then
            mv run_app.app uPtt.app
            zip -r uPtt.zip uPtt.app
          else
            echo "Error: .app bundle not found"
            exit 1
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/uPtt.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
