name: CI/CD Workflow

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  # 第一階段：執行測試 (在 Linux 執行以節省資源)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (Linux Qt6)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          # 使用 QT_QPA_PLATFORM=offscreen 確保在無介面環境下能執行 Qt 測試
          QT_QPA_PLATFORM=offscreen pytest tests/

  # 第二階段：測試通過後，針對 main 與 beta 分支執行編譯
  build:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      # 處理版本號與發佈設定
      - name: Configure Version and Release
        id: config
        run: |
          # 取得原始版本號
          VERSION=$(grep "__version__ =" src/uPtt/__init__.py | cut -d '"' -f 2)
          IS_PRERELEASE=false
          
          if [ "${{ github.ref }}" = "refs/heads/beta" ]; then
            # Beta 分支：加上 beta 字樣與流水號
            NEW_VERSION="${VERSION}beta${{ github.run_number }}"
            # 使用 sed 修改 __init__.py 中的版本號 (macOS sed 與 Linux 略有不同)
            sed -i '' "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/uPtt/__init__.py
            VERSION=$NEW_VERSION
            IS_PRERELEASE=true
            echo "RELEASE_TITLE=uPtt Beta v$VERSION" >> $GITHUB_ENV
          else
            # Main 分支：正式版
            echo "RELEASE_TITLE=uPtt Official v$VERSION" >> $GITHUB_ENV
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Final Version to build: $VERSION"

      # Nuitka 快取：加速 C 語言編譯過程
      - name: Nuitka Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/Library/Caches/Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install nuitka zstandard
          brew install librsvg

      - name: Generate macOS Icon
        run: |
          ASSETS_DIR="src/uPtt/ui/assets"
          ICON_SVG="$ASSETS_DIR/logo_icon.svg"
          ICONSET="$ASSETS_DIR/logo.iconset"
          mkdir -p "$ICONSET"
          
          # 產生 macOS 要求的各種尺寸 PNG
          # 格式: icon_尺寸x尺寸.png 以及 icon_尺寸x尺寸@2x.png (兩倍解析度)
          for size in 16 32 128 256 512; do
            rsvg-convert -w $size -h $size "$ICON_SVG" -o "$ICONSET/icon_${size}x${size}.png"
            double_size=$((size * 2))
            rsvg-convert -w $double_size -h $double_size "$ICON_SVG" -o "$ICONSET/icon_${size}x${size}@2x.png"
          done
          
          # 使用 iconutil 產生 icns 檔案
          iconutil -c icns "$ICONSET" -o "$ASSETS_DIR/logo_icon.icns"
          
          # 清理暫存目錄
          rm -rf "$ICONSET"
          
      - name: Build with Nuitka
        run: |
          # 編譯時 Nuitka 需要直接存取 uPtt 套件，所以設定 PYTHONPATH=src
          # 明確包含 websockets 與 qasync 以避免運行時動態載入失敗
          PYTHONPATH=src python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --plugin-enable=pyside6 \
            --include-package=PyPtt \
            --include-package=websockets \
            --include-package=qasync \
            --include-package-data=uPtt.ui.assets \
            --macos-app-name="uPtt" \
            --macos-app-icon=src/uPtt/ui/assets/logo_icon.icns \
            --output-dir=dist \
            --no-pyi-file \
            src/run_app.py

      - name: Package .app for distribution
        run: |
          cd dist
          if [ -d "uPtt.app" ]; then
            zip -r uPtt.zip uPtt.app
          elif [ -d "run_app.app" ]; then
            mv run_app.app uPtt.app
            zip -r uPtt.zip uPtt.app
          else
            echo "Error: .app bundle not found"
            exit 1
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/uPtt.zip
          tag_name: v${{ steps.config.outputs.VERSION }}
          name: ${{ env.RELEASE_TITLE }}
          prerelease: ${{ steps.config.outputs.IS_PRERELEASE }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
