name: CI/CD Workflow

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  # 秘密掃描：使用 TruffleHog 檢查是否有敏感資訊洩漏
  # 無論任何檔案異動都必須執行，README 等文件也可能意外包含敏感資訊
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        if: github.event.before != '0000000000000000000000000000000000000000'
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # 偵測是否有需要測試與編譯的檔案異動
  # 純文件異動 (README、*.md) 時，後續 test / build jobs 會自動跳過
  changes:
    needs: [secret-scan]
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'requirements*.txt'
              - '.github/workflows/**'

  # 第一階段：執行測試 (在 Linux 執行以節省資源)
  test:
    needs: [changes]
    if: needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (Linux Qt6)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          # 使用 QT_QPA_PLATFORM=offscreen 確保在無介面環境下能執行 Qt 測試
          QT_QPA_PLATFORM=offscreen pytest tests/

  # 靜態安全分析 + 依賴套件漏洞掃描
  security-analysis:
    needs: [changes]
    if: needs.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Bandit static security analysis
        # 掃描 src/ 目錄，中等以上嚴重度（-ll）且中等以上可信度（-ii）
        # 可偵測：可疑的網路呼叫、不安全的函數使用、SQL injection 等
        run: bandit -r src/ -ll -ii

      - name: pip-audit dependency vulnerability scan
        # 掃描 requirements.txt 中已知有漏洞的套件（供應鏈攻擊防護）
        run: pip-audit -r requirements.txt

  # 統一版本號計算，確保 macOS 與 Windows 使用完全一致的版本
  prepare-version:
    needs: [test, security-analysis]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta')
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.config.outputs.VERSION }}
      VERSION_NUMERIC: ${{ steps.config.outputs.VERSION_NUMERIC }}
      IS_PRERELEASE: ${{ steps.config.outputs.IS_PRERELEASE }}
      RELEASE_TITLE: ${{ steps.config.outputs.RELEASE_TITLE }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Version and Release
        id: config
        run: |
          VERSION=$(grep "__version__ =" src/uPtt/__init__.py | cut -d '"' -f 2)
          IS_PRERELEASE=false

          if [ "${{ github.ref }}" = "refs/heads/beta" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-4)
            DATE_TAG=$(date -u +%Y%m%d)
            VERSION="${VERSION}-beta.${DATE_TAG}.${SHORT_SHA}"
            IS_PRERELEASE=true
          fi

          RELEASE_TITLE="uPtt v${VERSION}"

          VERSION_NUMERIC=$(echo "$VERSION" | grep -oE '^[0-9]+(\.[0-9]+)*')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NUMERIC=$VERSION_NUMERIC" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "Final Version: $VERSION (numeric: $VERSION_NUMERIC, prerelease: $IS_PRERELEASE)"

  # 測試通過後，針對 main 與 beta 分支執行編譯
  build-macos:
    needs: [prepare-version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Patch version in source
        run: |
          VERSION="${{ needs.prepare-version.outputs.VERSION }}"
          python -c "
          import re, pathlib
          f = pathlib.Path('src/uPtt/__init__.py')
          f.write_text(re.sub(r'__version__ = \".*?\"', '__version__ = \"$VERSION\"', f.read_text()))
          "
          echo "RELEASE_TITLE=${{ needs.prepare-version.outputs.RELEASE_TITLE }}" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install nuitka zstandard

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-librsvg-${{ runner.arch }}

      - name: Install librsvg
        run: brew install librsvg

      - name: Generate macOS Icon
        run: |
          ASSETS_DIR="src/uPtt/ui/assets"
          ICON_SVG="$ASSETS_DIR/logo_icon.svg"
          ICONSET="$ASSETS_DIR/logo.iconset"
          mkdir -p "$ICONSET"
          
          # 產生 macOS 要求的各種尺寸 PNG
          for size in 16 32 128 256 512; do
            rsvg-convert -w $size -h $size "$ICON_SVG" -o "$ICONSET/icon_${size}x${size}.png"
            double_size=$((size * 2))
            rsvg-convert -w $double_size -h $double_size "$ICON_SVG" -o "$ICONSET/icon_${size}x${size}@2x.png"
          done
          
          iconutil -c icns "$ICONSET" -o "$ASSETS_DIR/logo_icon.icns"
          rm -rf "$ICONSET"
          
      - name: Cache Nuitka (macOS)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Nuitka
          key: nuitka-macos-${{ runner.arch }}-${{ hashFiles('src/**/*.py', 'requirements.txt') }}
          restore-keys: nuitka-macos-${{ runner.arch }}-

      - name: Build with Nuitka
        run: |
          PYTHONPATH=src python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --plugin-enable=pyside6 \
            --include-package=PyPtt \
            --include-package=websockets \
            --include-package=qasync \
            --include-package-data=uPtt.ui.assets \
            --macos-app-name="uPtt" \
            --macos-app-icon=src/uPtt/ui/assets/logo_icon.icns \
            --output-dir=dist \
            --no-pyi-file \
            src/run_app.py

      - name: Smoke test macOS binary
        run: |
          if [ -d "dist/uPtt.app" ]; then
            APP_DIR="dist/uPtt.app"
          elif [ -d "dist/run_app.app" ]; then
            APP_DIR="dist/run_app.app"
          else
            echo "ERROR: No .app bundle found in dist/"
            ls dist/
            exit 1
          fi
          # Derive binary name from the .app bundle name (e.g. run_app.app → run_app)
          APP_NAME=$(basename "$APP_DIR" .app)
          APP_BINARY="$APP_DIR/Contents/MacOS/$APP_NAME"
          echo "Smoke testing: $APP_BINARY"
          EXIT_CODE=0
          # macOS has no `timeout`; run in background and kill after 10 s
          QT_QPA_PLATFORM=offscreen "$APP_BINARY" --debug &
          BG_PID=$!
          sleep 10
          if kill -0 "$BG_PID" 2>/dev/null; then
            kill "$BG_PID"
            EXIT_CODE=124   # still running → treat as success
          else
            wait "$BG_PID"
            EXIT_CODE=$?
          fi
          # 124 = timed out (still running) → success; 0 = clean exit → success
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ]; then
            echo "ERROR: Binary crashed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Smoke test passed (exit code: $EXIT_CODE)"

      - name: Package .app for distribution
        run: |
          cd dist
          if [ -d "uPtt.app" ]; then
            zip -r uPtt-macOS.zip uPtt.app
          elif [ -d "run_app.app" ]; then
            mv run_app.app uPtt.app
            zip -r uPtt-macOS.zip uPtt.app
          fi

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/uPtt-macOS.zip
          tag_name: v${{ needs.prepare-version.outputs.VERSION }}
          name: ${{ env.RELEASE_TITLE }}
          prerelease: ${{ needs.prepare-version.outputs.IS_PRERELEASE }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: [prepare-version]
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Patch version in source
        shell: bash
        run: |
          VERSION="${{ needs.prepare-version.outputs.VERSION }}"
          python -c "
          import re, pathlib
          f = pathlib.Path('src/uPtt/__init__.py')
          f.write_text(re.sub(r'__version__ = \".*?\"', '__version__ = \"$VERSION\"', f.read_text()))
          "
          echo "RELEASE_TITLE=${{ needs.prepare-version.outputs.RELEASE_TITLE }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install nuitka zstandard pefile

      - name: Generate Windows Icon
        shell: pwsh
        run: |
          $ASSETS_DIR = "src/uPtt/ui/assets"
          # 使用 Windows Runner 內建的 ImageMagick 轉換 SVG 到 ICO
          # 包含多種尺寸以確保在各種顯示模式下都清晰
          & magick convert -background none "$ASSETS_DIR/logo_icon.svg" -define icon:auto-resize=16,32,48,64,128,256 "$ASSETS_DIR/logo_icon.ico"

      - name: Cache Nuitka (Windows)
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-windows-${{ runner.arch }}-v1
          restore-keys: nuitka-windows-${{ runner.arch }}-

      - name: Build with Nuitka (standalone)
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m nuitka `
            --standalone `
            --windows-console-mode=disable `
            --plugin-enable=pyside6 `
            --include-package=PyPtt `
            --include-package=websockets `
            --include-package=qasync `
            --include-package-data=uPtt.ui.assets `
            --windows-icon-from-ico=src/uPtt/ui/assets/logo_icon.ico `
            --output-dir=dist `
            --assume-yes-for-downloads `
            --windows-dependency-tool=pefile `
            --windows-company-name="uPtt" `
            --windows-product-name="uPtt" `
            --windows-product-version="${{ needs.prepare-version.outputs.VERSION_NUMERIC }}" `
            --windows-file-description="uPtt Messenger for PTT" `
            src/run_app.py

      - name: Rename standalone folder
        shell: pwsh
        run: |
          # Nuitka standalone outputs to dist/run_app.dist — rename to dist/uPtt
          if (Test-Path "dist\run_app.dist") {
            Rename-Item "dist\run_app.dist" "uPtt"
          }
          # Also rename the executable inside
          if (Test-Path "dist\uPtt\run_app.exe") {
            Rename-Item "dist\uPtt\run_app.exe" "uPtt.exe"
          }

      - name: Smoke test Windows binary
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\uPtt\uPtt.exe")) {
            Write-Error "ERROR: dist\uPtt\uPtt.exe not found"
            ls dist
            exit 1
          }
          Write-Host "Smoke testing: dist\uPtt\uPtt.exe"
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = Start-Process -FilePath "dist\uPtt\uPtt.exe" -ArgumentList "--debug" -PassThru
          Start-Sleep -Seconds 10
          if ($proc.HasExited) {
            if ($proc.ExitCode -ne 0) {
              Write-Error "ERROR: Binary crashed with exit code $($proc.ExitCode)"
              exit 1
            }
            Write-Host "Smoke test passed (binary exited cleanly)"
          } else {
            $proc.Kill()
            Write-Host "Smoke test passed (binary was still running after 10s)"
          }

      - name: Download Inno Setup Chinese Traditional language file
        shell: pwsh
        run: |
          $langDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseTraditional.isl"
          Invoke-WebRequest -Uri $url -OutFile "$langDir\ChineseTraditional.isl"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare-version.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVERSION=$VERSION scripts\installer.iss

      - name: Package installer for distribution
        shell: pwsh
        run: |
          # The installer exe is at dist/installer/uPtt-Windows-Setup.exe
          cd dist\installer
          Compress-Archive -Path "uPtt-Windows-Setup.exe" -DestinationPath "uPtt-Windows.zip"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/installer/uPtt-Windows.zip
          tag_name: v${{ needs.prepare-version.outputs.VERSION }}
          name: ${{ env.RELEASE_TITLE }}
          prerelease: ${{ needs.prepare-version.outputs.IS_PRERELEASE }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
