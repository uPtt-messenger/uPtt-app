name: CI/CD Workflow

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  # 秘密掃描：使用 TruffleHog 檢查是否有敏感資訊洩漏
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified


  # 第一階段：執行測試 (在 Linux 執行以節省資源)
  test:
    needs: [secret_scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (Linux Qt6)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          # 使用 QT_QPA_PLATFORM=offscreen 確保在無介面環境下能執行 Qt 測試
          QT_QPA_PLATFORM=offscreen pytest tests/

  # 測試通過後，針對 main 與 beta 分支執行編譯
  build-macos:
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      # 處理版本號與發佈設定
      - name: Configure Version and Release
        id: config
        run: |
          # 取得原始版本號
          VERSION=$(grep "__version__ =" src/uPtt/__init__.py | cut -d '"' -f 2)
          IS_PRERELEASE=false
          
          if [ "${{ github.ref }}" = "refs/heads/beta" ]; then
            # Beta 分支：加上 beta 字樣與 Commit SHA 前四碼
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-4)
            NEW_VERSION="${VERSION}beta${SHORT_SHA}"
            # 使用 Python 跨平台修改版本號
            python3 -c "import sys; c = open('src/uPtt/__init__.py').read().replace('__version__ = \"' + sys.argv[1] + '\"', '__version__ = \"' + sys.argv[2] + '\"'); open('src/uPtt/__init__.py', 'w').write(c)" "$VERSION" "$NEW_VERSION"
            VERSION=$NEW_VERSION
            IS_PRERELEASE=true
            echo "RELEASE_TITLE=uPtt Beta v$VERSION" >> $GITHUB_ENV
          else
            # Main 分支：正式版
            echo "RELEASE_TITLE=uPtt Official v$VERSION" >> $GITHUB_ENV
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Final Version to build: $VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install nuitka zstandard
          brew install librsvg

      - name: Generate macOS Icon
        run: |
          ASSETS_DIR="src/uPtt/ui/assets"
          ICON_SVG="$ASSETS_DIR/logo_icon.svg"
          ICONSET="$ASSETS_DIR/logo.iconset"
          mkdir -p "$ICONSET"
          
          # 產生 macOS 要求的各種尺寸 PNG
          for size in 16 32 128 256 512; do
            rsvg-convert -w $size -h $size "$ICON_SVG" -o "$ICONSET/icon_${size}x${size}.png"
            double_size=$((size * 2))
            rsvg-convert -w $double_size -h $double_size "$ICON_SVG" -o "$ICONSET/icon_${size}x${size}@2x.png"
          done
          
          iconutil -c icns "$ICONSET" -o "$ASSETS_DIR/logo_icon.icns"
          rm -rf "$ICONSET"
          
      - name: Build with Nuitka
        run: |
          PYTHONPATH=src python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --plugin-enable=pyside6 \
            --include-package=PyPtt \
            --include-package=websockets \
            --include-package=qasync \
            --include-package-data=uPtt.ui.assets \
            --macos-app-name="uPtt" \
            --macos-app-icon=src/uPtt/ui/assets/logo_icon.icns \
            --output-dir=dist \
            --no-pyi-file \
            src/run_app.py

      - name: Package .app for distribution
        run: |
          cd dist
          if [ -d "uPtt.app" ]; then
            zip -r uPtt-macOS.zip uPtt.app
          elif [ -d "run_app.app" ]; then
            mv run_app.app uPtt.app
            zip -r uPtt-macOS.zip uPtt.app
          fi

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/uPtt-macOS.zip
          tag_name: v${{ steps.config.outputs.VERSION }}
          name: ${{ env.RELEASE_TITLE }}
          prerelease: ${{ steps.config.outputs.IS_PRERELEASE }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 處理版本號 (使用 PowerShell 讀取，Python 修改)
      - name: Configure Version and Release
        id: config
        shell: bash
        run: |
          VERSION=$(grep "__version__ =" src/uPtt/__init__.py | cut -d '"' -f 2)
          IS_PRERELEASE=false
          
          if [ "${{ github.ref }}" = "refs/heads/beta" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-4)
            NEW_VERSION="${VERSION}beta${SHORT_SHA}"
            python -c "import sys; c = open('src/uPtt/__init__.py').read().replace('__version__ = \"' + sys.argv[1] + '\"', '__version__ = \"' + sys.argv[2] + '\"'); open('src/uPtt/__init__.py', 'w').write(c)" "$VERSION" "$NEW_VERSION"
            VERSION=$NEW_VERSION
            IS_PRERELEASE=true
            echo "RELEASE_TITLE=uPtt Beta v$VERSION" >> $GITHUB_ENV
          else
            echo "RELEASE_TITLE=uPtt Official v$VERSION" >> $GITHUB_ENV
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install nuitka zstandard

      - name: Generate Windows Icon
        shell: pwsh
        run: |
          $ASSETS_DIR = "src/uPtt/ui/assets"
          # 使用 Windows Runner 內建的 ImageMagick 轉換 SVG 到 ICO
          # 包含多種尺寸以確保在各種顯示模式下都清晰
          & magick convert -background none "$ASSETS_DIR/logo_icon.svg" -define icon:auto-resize=16,32,48,64,128,256 "$ASSETS_DIR/logo_icon.ico"

      - name: Build with Nuitka
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --plugin-enable=pyside6 `
            --include-package=PyPtt `
            --include-package=websockets `
            --include-package=qasync `
            --include-package-data=uPtt.ui.assets `
            --windows-icon-from-ico=src/uPtt/ui/assets/logo_icon.ico `
            --output-filename=uPtt.exe `
            --output-dir=dist `
            --assume-yes-for-downloads `
            --no-pyi-file `
            src/run_app.py

      - name: Package for distribution
        shell: pwsh
        run: |
          cd dist
          if (Test-Path "uPtt.exe") {
              Compress-Archive -Path "uPtt.exe" -DestinationPath "uPtt-Windows.zip"
          }

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/uPtt-Windows.zip
          tag_name: v${{ steps.config.outputs.VERSION }}
          name: ${{ env.RELEASE_TITLE }}
          prerelease: ${{ steps.config.outputs.IS_PRERELEASE }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
